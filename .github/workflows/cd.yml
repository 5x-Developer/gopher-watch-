name: Gopher-Watch CD

on:
  workflow_run:
    workflows: ["Gopher-Watch CI"]
    types:
      - completed
    branches: [main]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set lowercase image owner
        id: lowercase
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ steps.lowercase.outputs.owner }}/gopher-watch:latest

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DROPLET_SSH_KEY }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DROPLET_IP }} >> ~/.ssh/known_hosts

      - name: Copy configs to Droplet
        run: |
          ssh -i ~/.ssh/deploy_key root@${{ secrets.DROPLET_IP }} "mkdir -p /opt/gopher-watch/configs/prometheus"
          rsync -avz -e "ssh -i ~/.ssh/deploy_key" configs/ root@${{ secrets.DROPLET_IP }}:/opt/gopher-watch/configs/
          rsync -avz -e "ssh -i ~/.ssh/deploy_key" docker-compose.prod.yml root@${{ secrets.DROPLET_IP }}:/opt/gopher-watch/

      - name: Deploy to Droplet
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GRAFANA_PASSWORD: ${{ secrets.GRAFANA_PASSWORD }}
          IMAGE_OWNER: ${{ steps.lowercase.outputs.owner }}
        run: |
          ssh -i ~/.ssh/deploy_key root@${{ secrets.DROPLET_IP }} bash << EOF
            cd /opt/gopher-watch
            echo "SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL}" > .env
            echo "GRAFANA_PASSWORD=${GRAFANA_PASSWORD}" >> .env
            export IMAGE_OWNER=${IMAGE_OWNER}
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
          EOF
