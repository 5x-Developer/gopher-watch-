name: Gopher-Watch CI

on:
  push:
    branches: [ "main", "features/*" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.22.x'
        cache: true 

    - name: Run Tests
      # This uses your Makefile's 'test' target which includes the race detector
      run: make test

    - name: Build Check
      # Verifies the app compiles correctly for Linux
      run: make build

    - name: Artifact Upload
      # This saves the compiled binary in the GitHub UI
      uses: actions/upload-artifact@v4
      with:
        name: gopher-watch-binary
        path: gopher-watch