services:
  app:
    build: .
    env_file: .env #passes SlackURL
    ports:
      - "8080:8080"
    volumes:
      - ./configs:/root/configs:ro # Mount the configs directory as read-only

  prometheus:
    image: prom/prometheus
    volumes:
      - ./configs/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090" 

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    env_file: .env               # <--- Read the .env file
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD} # <--- Use the variable
    volumes:
      - grafana-storage:/var/lib/grafana
volumes:
  grafana-storage: